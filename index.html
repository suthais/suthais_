<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPCalc Pro - Premium IP Subnet Calculator</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      try {
        const themeStorage = localStorage.getItem('ipcalc-theme-storage');
        if (themeStorage) {
          const state = JSON.parse(themeStorage).state;
          if (state && state.isDarkMode) {
            document.documentElement.classList.add('dark');
          }
        } else {
          // Default to dark mode if no storage exists
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-500 font-['Inter']">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
